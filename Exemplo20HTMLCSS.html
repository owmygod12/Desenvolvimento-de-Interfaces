<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exemplo 20 HTML CSS - Seletores CSS</title>
  <style>

    /* SELETOR DE TIPO — afeta todos os elementos daquela tag */
    body{
       margin: 25px;
       background-color: rgb(222, 214, 214);
       padding: 20px;
       font-weight: bold;
    
        }
    h1 {
        background-color: yellow;
        margin: 10px;
        padding: 30px;
        color: green;
     
    }

    p {
        text-align: right;
        color: purple;
        margin: 20px;

    }

    a {
        color: blue;
        padding: 20px;
        
    }

    li {
        font-size: 30px;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        font-style: italic;
        font-weight: 300;
       
    }


    /* SELETOR DE CLASSE — afeta elementos com class="..." */

    .destaque {
        background-color: pink;
        text-align: justify;

    }

    .alerta {
        font-size: 56px;
        font-weight: 500;
        background-color: aquamarine;

    }

    .secundario {
        font-size: 30px;
        font-weight: 300;
        background-color: pink;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

    }


    /* SELETOR DE ID — afeta o elemento único com id="..." */

    #cabecalho {
        color: black;
        font-size: 20px;
        font-variant-emoji: emoji;
    }

    #rodape {
        background-color: brown;
        padding: 20px;
        margin: 20px;
        font-size: 30px;
        color: blue;

    }

  </style>
</head>
<body>

  <header id="cabecalho">
    <h1>Título da Página</h1>
  </header>

  <main>
    <p>Parágrafo comum.</p>
    <p class="destaque">Parágrafo com classe destaque.</p>
    <p class="alerta">Parágrafo com classe alerta.</p>
    <p class="secundario">Parágrafo com classe secundario.</p>

    <ul>
      <li>Item comum</li>
      <li class="destaque">Item com classe destaque</li>
      <li class="alerta">Item com classe alerta</li>
    </ul>

    <a href="#">Link comum</a>
  </main>

  <footer id="rodape">
    <p>Rodapé da página.</p>
  </footer>

</body>
</html>
